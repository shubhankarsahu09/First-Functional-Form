<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

<body>
    <form action="post">

        <h1>This is a website where studdent can fill there details and then submit it. (Trail website)</h1>
        <div>
            Student's Name:
            <br>
            <input type="text" name="username" placeholder="Enter your name">
        </div>
        <br>
        <div>
            Date of Birth:
            <br>
            <label for="birthday"></label>
            <input type="date" id="birthday" name="birthday">
        </div>
        <br>
        <div>
            Admission Number:
            <br>
            <input type="number" name="username" placeholder="Enter your adimission number">
        </div>
        <br>
        <div>
            Gender:<input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label>
        </div>
        <br>
        <div>
            Adimission Date:
            <br>
            <label for="birthday"></label>
            <input type="date" id="birthday" name="birthday">
        </div>
        <br>
        <div>
            Father's Name:
            <br>
            <input type="text" name="username" placeholder="Enter your father's name">
        </div>
        <br>
        <div>
            Mother's Name:
            <br>
            <input type="text" name="username" placeholder="Enter your mother's name">
        </div>
        <br>
        <div>
            Mobile Number:
            <br>
            <input type="number" name="username" placeholder="Enter your number">
        </div>
        <br>
        <div>
            Temporary Address:
            <br>
            <textarea name="comment" rows="7" cols="70"></textarea>
        </div>
        <br>
        <div>
            Permanent Address:
            <br>
            <textarea name="comment" rows="7" cols="70"></textarea>
        </div>

        Select Category:
        <select name="Select Category">
            <option value="None">None</option>
            <option value="OBC">OBC</option>
            <option value="ST/SC">ST/SC</option>
            <option value="General">General</option>
        </select>
        <br>
        <br>
        <br>
        <br>
        <br>
         <input type="submit" value="Submit">
    </form>

</html>
